services:
  - type: web
    name: atlas33-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://atlas-33.vercel.app
      - key: FRONTEND_URL
        value: https://atlas-33.vercel.app
      - key: ENVIRONMENT
        value: production
